<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BITRADE // ACCESS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800;900&family=Archivo+Black&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/bauhaus.css">
</head>
<body class="bg-white min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <div class="flex items-center gap-4 mb-10">
            <div class="flex gap-2">
                <div class="bau-shape bau-circle w-6 h-6"></div>
                <div class="bau-shape bau-square w-6 h-6"></div>
                <div class="bau-shape bau-triangle w-6 h-6 border-b-[24px] border-l-[12px] border-r-[12px] border-b-[#FACC15] border-l-transparent border-r-transparent"></div>
            </div>
            <h1 class="text-3xl font-black archivo-bold tracking-tighter uppercase">BITRADE.<span class="text-red-600">CORE</span></h1>
        </div>

        <div class="bau-tile p-10">
            <div class="label-bau mb-6">
                <div class="bau-shape bau-square"></div>
                <span class="uppercase tracking-widest">ACCESS_CONTROL</span>
            </div>

            <h2 class="text-4xl font-black archivo-bold tracking-tighter uppercase leading-none mb-8">SECURE<br><span class="text-red-600">LOGIN</span></h2>

            <form action="/login" method="post" class="space-y-6">
                <div>
                    <label class="bau-label">ADMIN USERNAME</label>
                    <input
                        type="text"
                        name="username"
                        placeholder="admin"
                        class="bau-input w-full text-center text-xl"
                        autocomplete="username"
                        required
                        autofocus
                    >
                </div>

                <div>
                    <label class="bau-label">ADMIN PASSWORD</label>
                    <input
                        type="password"
                        name="password"
                        placeholder="********"
                        class="bau-input w-full text-center tracking-[0.3em] text-xl"
                        autocomplete="current-password"
                        required
                    >
                </div>

                {% if error %}
                <div class="border-4 border-red-600 bg-red-50 p-3">
                    <p class="text-xs font-black text-red-600 uppercase tracking-widest">{{ error }}</p>
                </div>
                {% endif %}

                <button type="submit" class="btn-bau btn-bau-yellow w-full justify-center py-4 text-sm tracking-widest font-black">
                    AUTHENTICATE
                </button>
            </form>
        </div>

        <div class="mt-6 flex items-center justify-between px-1">
            <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">BITRADE CORE // AUTHORIZED ACCESS ONLY</p>
            <div class="flex gap-1">
                <div class="w-2 h-2 bg-black"></div>
                <div class="w-2 h-2 bg-red-600"></div>
                <div class="w-2 h-2 bg-yellow-400"></div>
            </div>
        </div>
    </div>
</body>
</html>
